name: Build and Publish GHCR deploy-ghcr

# Isolated GHCR migration branch. Only deploy-ghcr triggers this workflow.
on:
  push:
    branches:
      - deploy-ghcr
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    permissions:
      contents: read
      packages: write

    env:
      COOLIFY_APP_UUID:     ${{ vars.COOLIFY_APP_UUID }}
      IMAGE_TAG_ROLLING:    ${{ vars.IMAGE_TAG_ROLLING }}
      IMAGE_TAG_SHA_PREFIX: ${{ vars.IMAGE_TAG_SHA_PREFIX }}

    steps:
      - name: 前置检查（Coolify 部署所需配置）
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          BASE:  ${{ secrets.COOLIFY_BASE_URL }}
        run: |
          missing=()
          [ -z "$TOKEN" ] && missing+=("repo secret: COOLIFY_API_TOKEN")
          [ -z "$BASE"  ] && missing+=("repo secret: COOLIFY_BASE_URL")
          [ -z "$COOLIFY_APP_UUID" ]  && missing+=("environment '${{ github.ref_name }}' var: COOLIFY_APP_UUID")
          [ -z "$IMAGE_TAG_ROLLING" ] && missing+=("environment '${{ github.ref_name }}' var: IMAGE_TAG_ROLLING")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::缺少 Coolify 部署配置，构建已中止："
            printf '  - %s
' "${missing[@]}"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖（卡口测试需要）
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt -r tests/requirements.txt
          npm ci --prefix frontend

      - name: 构建前端（pytest 的 SPA 深链测试需要 frontend/dist）
        run: npm --prefix frontend run build

      - name: 协议契约测试（卡口：失败则不发布镜像）
        run: python -m pytest tests/ -q

      - uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG_ROLLING }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG_SHA_PREFIX }}${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 触发 Coolify 部署
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          BASE:  ${{ secrets.COOLIFY_BASE_URL }}
        run: |
          BASE="${BASE%/}"
          curl -sSL --fail-with-body -X POST             -H "Authorization: Bearer $TOKEN"             "$BASE/api/v1/deploy?uuid=$COOLIFY_APP_UUID&force=false"
