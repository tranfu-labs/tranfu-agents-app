name: Build and Publish to GHCR

# push main 触发：前置检查 → 跑测试卡口 → 构建镜像 → 推 GHCR → 通知 Coolify 拉新镜像部署。
# 配置依赖：
#   - Org secret   COOLIFY_API_TOKEN  (tranfu-labs 组织级，全 repo 共用)
#   - Org variable COOLIFY_BASE_URL   (tranfu-labs 组织级，全 repo 共用)
#   - 下方 COOLIFY_APP_UUID            (每个 repo 自己写死，明文非敏感)
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  COOLIFY_APP_UUID: zkmchkq57ovaecgpx1od5y2t

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 前置检查（Coolify 部署所需配置）
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          BASE: ${{ vars.COOLIFY_BASE_URL }}
        run: |
          missing=()
          [ -z "$TOKEN" ] && missing+=("COOLIFY_API_TOKEN (Org secret)")
          [ -z "$BASE" ]  && missing+=("COOLIFY_BASE_URL (Org variable)")
          [ -z "$COOLIFY_APP_UUID" ] && missing+=("COOLIFY_APP_UUID (workflow env)")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::缺少 Coolify 部署配置，构建已中止："
            printf '  - %s\n' "${missing[@]}"
            echo "::error::请到 https://github.com/organizations/tranfu-labs/settings/secrets/actions 配置后点 Re-run failed jobs。"
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖（卡口测试需要）
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt -r tests/requirements.txt
          npm ci --prefix frontend

      - name: 构建前端（pytest 的 SPA 深链测试需要 frontend/dist）
        run: npm --prefix frontend run build

      - name: 协议契约测试（卡口：失败则不发布镜像）
        run: python -m pytest tests/ -q

      - uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 触发 Coolify 部署
        env:
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          BASE: ${{ vars.COOLIFY_BASE_URL }}
        run: |
          curl -fsSL --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "$BASE/api/v1/deploy?uuid=$COOLIFY_APP_UUID&force=false"
