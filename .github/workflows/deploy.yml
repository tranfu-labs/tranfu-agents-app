name: Build and Publish to GHCR

# push main 触发：跑测试卡口 → 构建镜像 → 推 ghcr.io/<owner>/<repo>:latest + :<sha>。
# 本阶段只发布镜像，不触发 Coolify 自动部署（compose.yml 仍是 build 模式）。
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖（卡口测试需要）
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt -r tests/requirements.txt
          npm ci --prefix frontend

      - name: 构建前端（pytest 的 SPA 深链测试需要 frontend/dist）
        run: npm --prefix frontend run build

      - name: 协议契约测试（卡口：失败则不发布镜像）
        run: python -m pytest tests/ -q

      - uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
