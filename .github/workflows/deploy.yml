name: Build and Publish to GHCR (dev)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Validate Coolify config
        env:
          COOLIFY_APP_UUID: ${{ vars.COOLIFY_APP_UUID }}
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          test -n "$COOLIFY_APP_UUID"
          test -n "$COOLIFY_BASE_URL"
          test -n "$COOLIFY_API_TOKEN"

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/requirements.txt -r tests/requirements.txt
          npm ci --prefix frontend

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Run contract tests
        run: python -m pytest tests/ -q

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ vars.IMAGE_TAG_ROLLING }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ vars.IMAGE_TAG_SHA_PREFIX }}${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Coolify IMAGE_REF
        env:
          COOLIFY_APP_UUID: ${{ vars.COOLIFY_APP_UUID }}
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ vars.IMAGE_TAG_SHA_PREFIX }}${{ github.sha }}
        run: |
          test -n "$COOLIFY_APP_UUID"
          test -n "$COOLIFY_BASE_URL"
          test -n "$COOLIFY_API_TOKEN"
          BODY=$(jq -nc --arg k IMAGE_REF --arg v "$IMAGE_REF" '{key:$k,value:$v,is_literal:true}')
          HTTP_CODE=$(curl -sS -o /tmp/coolify-image-ref-response.json -w "%{http_code}" -X PATCH             --oauth2-bearer "$COOLIFY_API_TOKEN"             -H "Content-Type: application/json"             -d "$BODY"             "${COOLIFY_BASE_URL%/}/api/v1/applications/$COOLIFY_APP_UUID/envs")
          if [ "$HTTP_CODE" = "404" ]; then
            HTTP_CODE=$(curl -sS -o /tmp/coolify-image-ref-response.json -w "%{http_code}" -X POST               --oauth2-bearer "$COOLIFY_API_TOKEN"               -H "Content-Type: application/json"               -d "$BODY"               "${COOLIFY_BASE_URL%/}/api/v1/applications/$COOLIFY_APP_UUID/envs")
          fi
          [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ] || { cat /tmp/coolify-image-ref-response.json; exit 1; }

      - name: Trigger Coolify deploy
        env:
          COOLIFY_APP_UUID: ${{ vars.COOLIFY_APP_UUID }}
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          test -n "$COOLIFY_APP_UUID"
          test -n "$COOLIFY_BASE_URL"
          test -n "$COOLIFY_API_TOKEN"
          curl -sSL --fail-with-body -X POST             --oauth2-bearer "$COOLIFY_API_TOKEN"             "${COOLIFY_BASE_URL%/}/api/v1/deploy?uuid=$COOLIFY_APP_UUID&force=false"
