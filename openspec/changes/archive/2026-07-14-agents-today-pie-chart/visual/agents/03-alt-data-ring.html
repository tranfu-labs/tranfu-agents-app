<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>候选「同构数据环」</title><style>
:root{--bg:#101112;--panel:#17191b;--line:#303438;--text:#f2f3f4;--muted:#92999f;--brand:#f42631;--a:#5ca4ff;--b:#9b7cff;--c:#3ec7a2;--d:#f1a64b}*{box-sizing:border-box}body{margin:0;padding:24px;background:var(--bg);color:var(--text);font:13px/1.5 ui-monospace,SFMono-Regular,"PingFang SC",monospace}h1,h2,h3,p{margin-top:0}.meta,.sample,.panel{border:1px solid var(--line);background:var(--panel)}.meta{padding:12px;margin:14px 0 24px;color:var(--muted)}section{margin:0 0 32px;padding-bottom:28px;border-bottom:1px dashed var(--line)}.samples{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.sample{padding:14px}.sample h3{font-size:11px;color:var(--muted);letter-spacing:.08em}.seg{display:inline-flex;border:1px solid var(--line);padding:2px}.seg button,.legend button{border:0;background:transparent;color:var(--muted);font:inherit}.seg .on{background:var(--brand);color:white}.readout{display:flex;gap:20px}.readout span{display:flex;gap:7px;align-items:baseline}.readout small{color:var(--muted)}.ring{position:relative;width:150px;height:150px;margin:14px auto}.ring svg{width:100%;height:100%;transform:rotate(-90deg)}.ring circle{fill:none;stroke-width:24}.ring .track{stroke:#24272a}.ring .a{stroke:var(--a);stroke-dasharray:42 58}.ring .b{stroke:var(--b);stroke-dasharray:29 71;stroke-dashoffset:-42}.ring .c{stroke:var(--c);stroke-dasharray:18 82;stroke-dashoffset:-71}.ring .d{stroke:var(--d);stroke-dasharray:11 89;stroke-dashoffset:-89}.center{position:absolute;inset:0;display:grid;place-content:center;text-align:center}.center small{color:var(--muted)}.center b{font-size:24px}.legend{display:flex;justify-content:center;gap:6px;flex-wrap:wrap}.legend button{padding:5px 7px}.dot{display:inline-block;width:7px;height:7px;margin-right:5px}.tip{width:210px;padding:10px;border:1px solid var(--line);background:#111315;box-shadow:0 8px 24px #0008}.tip strong{display:block;margin-bottom:6px}.tip div{display:flex;justify-content:space-between;color:var(--muted)}.empty{padding:35px;text-align:center;color:var(--muted);border:1px dashed var(--line)}.bars{display:flex;align-items:end;gap:12px;height:110px;border-bottom:1px solid var(--line)}.bars i{width:20px;background:linear-gradient(to top,var(--a) 0 45%,var(--b) 45% 72%,var(--c) 72%)}.panel{max-width:720px;padding-bottom:14px}.head{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--line)}.content{display:grid;grid-template-columns:1fr 240px;gap:18px;align-items:center;padding:12px 18px}.content .ring{width:184px;height:184px}.content .facts{display:grid;gap:12px}.facts .readout{display:grid}.sample .bars{padding:0 10px}@media(max-width:650px){.samples,.content{grid-template-columns:1fr}.content .facts{order:-1}.panel{max-width:360px}}
</style></head><body><h1>候选「同构数据环」— 智能体列表页单日活跃分布</h1><div class="meta">实用 · 数据密度 · 完整复用现有趋势图的颜色、描边、图例与浮层</div>
<section><h2>一、组件样例库</h2><div class="samples">
<div class="sample"><h3>指标分段按钮</h3><div class="seg"><button class="on">活跃智能体</button><button>活跃时长</button></div></div>
<div class="sample"><h3>单日摘要</h3><div class="readout"><span><small>活跃智能体</small><b>7</b></span><span><small>活跃时长</small><b>11小时54分</b></span></div></div>
<div class="sample"><h3>扇形图与中心数值</h3><div class="ring"><svg viewBox="0 0 42 42"><circle class="track" cx="21" cy="21" r="15.9"/><circle class="a" cx="21" cy="21" r="15.9" pathLength="100"/><circle class="b" cx="21" cy="21" r="15.9" pathLength="100"/><circle class="c" cx="21" cy="21" r="15.9" pathLength="100"/><circle class="d" cx="21" cy="21" r="15.9" pathLength="100"/></svg><div class="center"><small>当前值</small><b>7</b></div></div></div>
<div class="sample"><h3>图例按钮</h3><div class="legend"><button><i class="dot" style="background:var(--a)"></i>哪吒</button><button><i class="dot" style="background:var(--b)"></i>小北</button><button><i class="dot" style="background:var(--c)"></i>阿辰</button></div></div>
<div class="sample"><h3>明细浮层</h3><div class="tip"><strong>07-14 · 今天进行中</strong><div><span>哪吒</span><b>3</b></div><div><span>小北</span><b>2</b></div><hr><div><span>合计</span><b>7 · 11小时54分</b></div></div></div>
<div class="sample"><h3>空状态</h3><div class="empty">当前筛选范围内暂无活跃趋势</div></div>
<div class="sample"><h3>堆叠柱状图</h3><div class="bars"><i style="height:50%"></i><i style="height:75%"></i><i style="height:62%"></i><i style="height:90%"></i><i style="height:70%"></i></div></div>
</div></section>
<section><h2>二、整体组合 — 单日入口态</h2><div class="panel"><div class="head"><strong>// 活跃趋势 · 今天</strong><div class="seg"><button class="on">活跃智能体</button><button>活跃时长</button></div></div><div class="content"><div><div class="ring"><svg viewBox="0 0 42 42"><circle class="track" cx="21" cy="21" r="15.9"/><circle class="a" cx="21" cy="21" r="15.9" pathLength="100"/><circle class="b" cx="21" cy="21" r="15.9" pathLength="100"/><circle class="c" cx="21" cy="21" r="15.9" pathLength="100"/><circle class="d" cx="21" cy="21" r="15.9" pathLength="100"/></svg><div class="center"><small>活跃智能体</small><b>7</b></div></div><div class="legend"><button><i class="dot" style="background:var(--a)"></i>哪吒</button><button><i class="dot" style="background:var(--b)"></i>小北</button><button><i class="dot" style="background:var(--c)"></i>阿辰</button><button><i class="dot" style="background:var(--d)"></i>其他</button></div></div><div class="facts"><div class="readout"><span><small>活跃智能体</small><b>7</b></span><span><small>活跃时长</small><b>11小时54分</b></span></div><div class="tip"><strong>07-14 · 今天进行中</strong><div><span>哪吒</span><b>3</b></div><div><span>小北</span><b>2</b></div><div><span>阿辰</span><b>1</b></div><div><span>其他</span><b>1</b></div><hr><div><span>合计</span><b>7 · 11小时54分</b></div></div></div></div></div></section>
</body></html>
