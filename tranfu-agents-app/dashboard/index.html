<style>
  :root{
    --bg:#0b0b0c; --grid:rgba(255,255,255,.018); --elev:rgba(255,255,255,.022); --elev2:rgba(255,255,255,.014);
    --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.15); --tick:rgba(255,255,255,.3); --hover:rgba(255,255,255,.04);
    --text:#ededee; --muted:#9ca0a6; --faint:#626670; --brand:#ec1c2b;
    --run:#3fb950; --wait:#d29922; --err:#f85149; --info:#58a6ff; --done:#6e7681;
    --r:10px; --sans:'Inter',system-ui,-apple-system,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace;
  }
  body.light{
    --bg:#f6f7f8; --grid:rgba(0,0,0,.03); --elev:rgba(0,0,0,.018); --elev2:rgba(0,0,0,.012);
    --line:rgba(0,0,0,.1); --line2:rgba(0,0,0,.18); --tick:rgba(0,0,0,.28); --hover:rgba(0,0,0,.03);
    --text:#16181d; --muted:#57606a; --faint:#8b949e;
    --run:#1a7f37; --wait:#9a6700; --err:#cf222e; --info:#0969da; --done:#6e7781;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:56px 56px;background-position:center top;transition:background-color .25s,color .25s}
  ::selection{background:rgba(127,127,127,.25)}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  a{color:inherit;text-decoration:none} :focus-visible{outline:2px solid var(--info);outline-offset:2px;border-radius:3px}
  button{font-family:inherit;color:inherit;background:none;border:0;cursor:pointer}

  .frame{position:relative;border:1px solid var(--line);border-radius:var(--r);background:var(--elev)}
  .frame::before,.frame::after{content:"";position:absolute;width:7px;height:7px;border:1px solid var(--tick)}
  .frame::before{left:-1px;top:-1px;border-right:0;border-bottom:0;border-top-left-radius:var(--r)}
  .frame::after{right:-1px;bottom:-1px;border-left:0;border-top:0;border-bottom-right-radius:var(--r)}

  /* header (上个版本的紧凑样式:读数内联在右侧) */
  header{display:flex;align-items:center;gap:16px;padding:13px 22px;border-bottom:1px solid var(--line);
    background:color-mix(in srgb,var(--bg) 94%,transparent);backdrop-filter:blur(6px);position:sticky;top:0;z-index:30;flex-wrap:wrap}
  .logo{display:inline-flex;align-items:center;gap:10px}
  .logo-fb{width:18px;height:18px;border-radius:5px;background:linear-gradient(135deg,var(--brand),#a60f1a);transform:skewX(-11deg)}
  .logo-tile{display:inline-flex;align-items:center;padding:4px;border-radius:6px}
  body.light .logo-tile{background:#0b0b0c}
  .logo-mark{height:20px;width:auto;display:block}
  .wm{font-weight:700;font-size:16px;letter-spacing:.04em}.wm i{color:var(--brand);font-style:normal}
  nav.tabs{display:flex;gap:2px;margin-left:6px}
  nav.tabs button{font-size:12.5px;color:var(--muted);padding:6px 12px;border-radius:7px;font-weight:500}
  nav.tabs button.on{color:var(--text);background:var(--hover)}nav.tabs button:hover{color:var(--text)}
  .readouts{margin-left:auto;display:flex}
  .ro{text-align:right;padding:1px 16px;border-left:1px solid var(--line)}
  .ro .n{font-family:var(--mono);font-size:19px;font-weight:600;line-height:1.05;font-variant-numeric:tabular-nums}
  .ro .n.live{color:var(--run)} .ro .n.up{color:var(--info)}
  .ro .l{font-size:9.5px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
  .live-pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--muted);padding:3px 9px;border:1px solid var(--line);border-radius:999px}
  .beat{width:6px;height:6px;border-radius:50%;background:var(--run);box-shadow:0 0 7px var(--run);animation:beat 2s ease-in-out infinite}
  @keyframes beat{50%{opacity:.45}}
  .demo{display:none;font-size:11px;color:#0b0b0c;background:var(--wait);padding:2px 8px;border-radius:4px;font-weight:600}
  body.is-demo .demo{display:inline-block}
  .ctl{display:flex;align-items:center;gap:6px}
  .seg{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .seg button{font-size:11px;padding:5px 9px;color:var(--faint);font-family:var(--mono)}.seg button.on{color:var(--text);background:var(--hover)}
  .icon-btn{width:30px;height:30px;border:1px solid var(--line);border-radius:7px;display:grid;place-items:center;color:var(--muted)}
  .icon-btn:hover{color:var(--text);border-color:var(--line2)}

  main{max-width:1480px;margin:0 auto;padding:20px 22px}
  .split{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start}
  @media(max-width:920px){.split{grid-template-columns:1fr}}
  h2{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:11px;font-weight:600;letter-spacing:.13em;color:var(--muted);margin:0;padding:13px 18px;border-bottom:1px solid var(--line);text-transform:uppercase}
  h2 .sl{color:var(--faint);font-family:var(--mono);margin-right:7px;font-weight:400}
  h2 .cnt{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:0;color:var(--faint);text-transform:none}h2 .cnt b{color:var(--run)}
  .pad{padding:18px}

  .pod{border:1px solid var(--line);border-radius:var(--r);padding:14px 16px 16px;margin-bottom:14px;background:var(--elev2)}
  .pod:last-child{margin-bottom:0}
  .phead{display:flex;align-items:center;gap:10px;margin-bottom:13px;flex-wrap:wrap}
  .avatar{width:34px;height:34px;border-radius:50%;flex:none;display:grid;place-items:center;font-weight:600;font-size:12px;color:#fff;background:var(--c,#555);border:2px solid var(--done)}
  .avatar.on{border-color:var(--run)} .avatar.err{border-color:var(--err)} .avatar.off{border-color:var(--line2)}
  .pname{font-weight:600;font-size:15px} .role{font-family:var(--mono);font-size:10px;color:var(--faint);border:1px solid var(--line2);padding:1px 6px;border-radius:4px}
  .pmeta{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint)}.pmeta b{color:var(--run)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
  .card{position:relative;border:1px solid var(--line);background:var(--bg);border-radius:9px;padding:14px;transition:border-color .15s,transform .15s;cursor:pointer}
  .card:hover{border-color:var(--line2);transform:translateY(-1px)}
  .card::after{content:"";position:absolute;left:14px;right:14px;top:0;height:2px;background:var(--done);opacity:.7;border-radius:2px}
  .card.s-running::after,.card.s-started::after{background:var(--run);opacity:1}.card.s-waiting::after{background:var(--wait);opacity:1}.card.s-blocked::after,.card.s-error::after{background:var(--err);opacity:1}
  .crow{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap}
  .mk{width:8px;height:8px;flex:none;border-radius:50%;background:var(--done)}
  .s-running .mk,.s-started .mk{background:var(--run);box-shadow:0 0 6px var(--run);animation:beat 1.6s ease-in-out infinite}
  .s-waiting .mk{background:var(--wait)}.s-blocked .mk,.s-error .mk{background:var(--err)}
  .alabel{font-weight:600;font-size:14px}
  .badge{font-size:10px;color:var(--muted);border:1px solid var(--line2);padding:1px 7px;border-radius:4px}
  .coarse{font-size:10px;color:var(--wait);border:1px solid var(--wait);padding:1px 7px;border-radius:4px;opacity:.8}
  .age{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint)}
  .task{font-size:13.5px;font-weight:500;margin:1px 0 4px}
  .step{font-family:var(--mono);font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
  .chip{font-family:var(--mono);font-size:10px;color:var(--muted);border:1px solid var(--line);padding:1px 6px;border-radius:4px}
  .metrics{display:flex;gap:8px 14px;margin-top:10px;flex-wrap:wrap;font-family:var(--mono);font-size:11px;color:var(--faint);padding-top:10px;border-top:1px solid var(--line)}
  .metrics b{color:var(--text);font-weight:500}
  .spark{display:flex;align-items:flex-end;gap:2px;height:18px;margin-left:auto}
  .spark i{width:5px;background:var(--line2);min-height:2px;border-radius:1px}.spark i.today{background:var(--info)}

  .feed-item{display:flex;gap:11px;padding:11px 18px;border-bottom:1px solid var(--line);font-size:12.5px}
  .feed-item:last-child{border:0}.ft{font-family:var(--mono);font-size:11px;color:var(--faint);flex:none;width:42px}
  .fmain{min-width:0}.fmain .l1{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fmain .l1 .stx{font-weight:400;color:var(--muted)}.fmain .sub{font-family:var(--mono);font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{text-align:left;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:10px 14px;border-bottom:1px solid var(--line)}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line)}tbody tr{cursor:pointer}tbody tr:hover{background:var(--hover)}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle}
  .q{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .qbar{display:inline-block;width:46px;height:5px;border-radius:3px;background:var(--line2);overflow:hidden;vertical-align:middle;margin-right:7px}.qbar i{display:block;height:100%;background:var(--run)}

  /* detail */
  .back{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:14px}.back:hover{color:var(--text)}
  .dhead{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:4px}
  .dhead .alabel{font-size:20px}
  .dsub{color:var(--muted);font-size:13px;margin-bottom:18px;max-width:760px}
  .dgrid{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;align-items:start}
  @media(max-width:860px){.dgrid{grid-template-columns:1fr}}
  .panel{border:1px solid var(--line);border-radius:var(--r);background:var(--elev2);padding:16px;margin-bottom:14px}
  .panel h3{margin:0 0 12px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600;display:flex;justify-content:space-between}
  .panel h3 .meta{color:var(--faint);font-family:var(--mono);font-weight:400;letter-spacing:0}
  .lead{font-size:14px;line-height:1.65;margin:0 0 10px}
  .note{border-left:2px solid var(--info);padding:2px 0 2px 12px;color:var(--muted);font-size:13px;line-height:1.6;background:linear-gradient(90deg,var(--hover),transparent)}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}.kv:last-child{border:0}.kv .k{color:var(--muted)}.kv .v{font-family:var(--mono);text-align:right}
  .ins{font-family:var(--mono);font-size:12px;line-height:1.7;color:var(--muted);white-space:pre-wrap;background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:11px 13px}
  .skill{padding:9px 0;border-bottom:1px solid var(--line)}.skill:last-child{border:0}
  .skill .nm{font-weight:600;font-size:13px;display:flex;align-items:center;gap:7px}
  .skill .nm .pin{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:4px;border:1px solid var(--line2);color:var(--muted)}
  .skill .nm .pin.local{color:var(--run);border-color:var(--run)}.skill .nm .pin.cross{color:var(--info);border-color:var(--info)}
  .skill .ds{font-size:12.5px;color:var(--muted);margin-top:2px}
  .pit{font-size:12.5px;color:var(--muted);padding:6px 0 6px 16px;position:relative;line-height:1.55}
  .pit::before{content:"!";position:absolute;left:0;top:6px;color:var(--wait);font-family:var(--mono);font-weight:600}
  .rec{padding:9px 0;border-bottom:1px solid var(--line)}.rec:last-child{border:0}
  .rec .rt{display:flex;justify-content:space-between;gap:10px;font-size:13px}.rec .rtask{font-weight:500}
  .rec .ro2{font-size:12px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
  .rec .st{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:4px;border:1px solid var(--line2);color:var(--muted)}
  .rec .st.done{color:var(--done)}.rec .st.error{color:var(--err);border-color:var(--err)}.rec .st.running{color:var(--run);border-color:var(--run)}
  .qrow{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
  .qcell .big{font-family:var(--mono);font-size:21px;font-weight:600;line-height:1}.qcell .big.good{color:var(--run)}.qcell .big.bad{color:var(--err)}
  .qcell .lbl{font-size:10px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:3px}
  .tag{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:5px;border:1px solid var(--line2);color:var(--muted)}
  .taglist{display:flex;gap:6px;flex-wrap:wrap}
  .sparkwrap{display:flex;align-items:flex-end;gap:4px;height:50px;margin-top:6px}
  .sparkwrap i{flex:1;background:var(--line2);min-height:2px;border-radius:2px 2px 0 0}.sparkwrap i.today{background:var(--info)}
  .contrib{display:grid;grid-template-columns:repeat(30,1fr);grid-template-rows:repeat(3,1fr);gap:3px;width:100%;aspect-ratio:10}
  .contrib i{border-radius:2px}
  .contrib i.pad{opacity:0;pointer-events:none}
  i.l0{background:var(--line2);opacity:.5}
  i.l1{background:var(--run);opacity:.32}i.l2{background:var(--run);opacity:.55}i.l3{background:var(--run);opacity:.78}i.l4{background:var(--run);opacity:1}
  .legend{display:flex;align-items:center;gap:3px;margin-top:11px;font-size:10px;color:var(--faint)}
  .legend i{width:11px;height:11px;border-radius:2px}.legend span{margin:0 5px}
  .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line2);border-radius:8px;padding:9px 15px;font-size:13px;font-weight:500;transition:.15s;width:100%;justify-content:center}
  .btn:hover{border-color:var(--text)}
  .hint{font-size:11.5px;color:var(--faint);margin-top:8px;line-height:1.5}
  .wip{font-family:var(--mono);font-size:9px;color:var(--faint);border:1px dashed var(--line2);padding:1px 6px;border-radius:4px;margin-left:6px}

  .govbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 16px}
  .gv{border:1px solid var(--line);border-radius:8px;padding:7px 12px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .gv b{font-family:var(--mono);color:var(--text);font-weight:600}
  .gv.warn{border-color:var(--wait)}.gv.warn b{color:var(--wait)}.gv.ok b{color:var(--run)}
  .src{font-family:var(--mono);font-size:9px;color:var(--faint);font-weight:400;letter-spacing:0;text-transform:none}
  .acc{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}.acc:last-child{border:0}
  .acc .k{color:var(--muted)}.acc .v{font-family:var(--mono)}.acc .v.warn{color:var(--wait)}
  .mem{padding:6px 0;border-bottom:1px solid var(--line);font-size:13px;line-height:1.55}.mem:last-child{border:0}
  .mem .mt{font-family:var(--mono);font-size:9px;color:var(--faint);border:1px solid var(--line);border-radius:4px;padding:0 5px;margin-right:7px}
  .empty{padding:30px 18px;text-align:center}.empty .t{color:var(--muted);font-size:13px}.empty .h{color:var(--faint);font-size:12px;margin-top:5px;font-family:var(--mono)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:.25s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:600px){
    header{gap:8px 10px;padding:10px 14px}
    .wm{font-size:15px}
    nav.tabs{order:5;width:100%;margin-left:0;justify-content:flex-start}
    nav.tabs button{padding:6px 11px}
    .ctl{margin-left:auto}
    .readouts{order:6;width:100%;margin-left:0;justify-content:flex-start;margin-top:2px}
    .readouts .ro{text-align:left;border-left:0;border-right:1px solid var(--line);padding:2px 12px 2px 0}
    .readouts .ro:last-child{border-right:0}
    .readouts .ro .n{font-size:16px}
    main{padding:14px 12px}
    .pad{padding:14px}
    h2{padding:11px 14px}
    .feed-item{padding:10px 14px}
    .dgrid{gap:12px}
    .qrow{grid-template-columns:1fr}
    section table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<header>
  <span class="logo"><svg class="logo-mark" viewBox="0 0 905 909" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TranFu"><defs><linearGradient id="tfRed" x1="25%" y1="8%" x2="72%" y2="96%">
    <stop offset="0%" stop-color="#ff2f37"/>
    <stop offset="48%" stop-color="#f42631"/>

 en:{board:"Pods",agents:"Agents",demo:"Demo · offline",

const ST={zh:{running:"运行中",started:"启动",waiting:"等待",blocked:"受阻",error:"错误",done:"完成",idle:"空闲"},
          en:{running:"running",started:"started",waiting:"waiting",blocked:"blocked",error:"error",done:"done",idle:"idle"}};
const RT={"claude-code":"Claude Code","claude-desktop":"Claude Desktop","codex":"Codex","open-claw":"Open Claw","hermes":"Hermes","manus":"Manus","mulerun":"MuleRun","chatgpt":"ChatGPT"};
let lang="zh",view="board",selKey=null,DATA=null;
const t=k=>I18N[lang][k]||k, stName=s=>ST[lang][s]||s;
const esc=s=>(s||"").replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));
const ago=ts=>{const s=(Date.now()-new Date(ts).getTime())/1000;return s<60?Math.round(s)+"s":s<3600?Math.round(s/60)+"m":Math.round(s/3600)+"h";};
const dur=s=>{if(!s)return"0";if(s<60)return s+"s";const m=Math.floor(s/60);if(m<60)return m+"m";const h=Math.floor(m/60);return h+"h"+(m%60?(" "+(m%60)+"m"):"");};
const LIVE=["running","started","waiting"];
const hashHue=s=>{let h=0;for(const c of s)h=(h*31+c.charCodeAt(0))%360;return h;};
const initials=s=>{const x=(s||"?").trim();return /^[\x00-\x7f]+$/.test(x)?(x.split(/[\s_\-.]+/).filter(Boolean).map(p=>p[0]).join("").slice(0,2)).toUpperCase():x.slice(0,1);};
const keyOf=a=>a.operator+"::"+(a.agent||a.runtime);
const sparkMini=ser=>{const mx=Math.max(...ser,1);return '<div class="spark">'+ser.map((v,i)=>'<i class="'+(i===6?"today":"")+'" style="height:'+Math.max(2,Math.round(v/mx*18))+'px"></i>').join("")+'</div>';};
function gen30(a,days){days=days||30;if(a.active_days&&a.active_days.length>=days)return a.active_days.slice(-days);
  const base=a.active_series||[3000],seed=hashHue(keyOf(a)),out=[];
  for(let i=0;i<days;i++){const b=base[i%base.length]||0,j=((seed*(i+7))%55)/100;out.push((seed+i*3)%5===0?0:Math.max(0,Math.round(b*(0.45+j))));}
  return out;}
const ACT_DAYS=90; // 活跃图天数(改这一个数即可)
function contrib(series){const today=new Date();today.setHours(0,0,0,0);
  const n=series.length,start=new Date(today);start.setDate(today.getDate()-(n-1));
  const mx=Math.max(...series,1);
  const lvl=v=>v<=0?0:(v<mx*0.25?1:(v<mx*0.5?2:(v<mx*0.75?3:4)));
  let cells="";
  for(let i=0;i<n;i++){const d=new Date(start);d.setDate(start.getDate()+i);
    const lab=d.toLocaleDateString(lang==="zh"?"zh-CN":"en-US",{month:"short",day:"numeric"});
    const v=series[i]||0;
    cells+=`<i class="l${lvl(v)}" title="${lab} · ${dur(v)}"></i>`;}
  return `<div class="contrib">${cells}</div>`;}

function toggleTheme(){const l=document.body.classList.toggle("light");document.getElementById("theme-btn").textContent=l?"☀":"🌙";}
function setLang(x){lang=x;document.getElementById("lang-zh").classList.toggle("on",x==="zh");document.getElementById("lang-en").classList.toggle("on",x==="en");document.documentElement.lang=x==="zh"?"zh-CN":"en";paintChrome();renderAll();}
function go(v){view=v;selKey=null;paintChrome();renderAll();}
function openAgent(k){selKey=k;view="detail";renderAll();window.scrollTo(0,0);}
function paintChrome(){document.getElementById("tab-board").textContent=t("board");document.getElementById("tab-agents").textContent=t("agents");
  document.getElementById("tab-board").classList.toggle("on",view==="board");document.getElementById("tab-agents").classList.toggle("on",view!=="board");
  document.getElementById("demo-badge").textContent=t("demo");}

function renderAll(){if(!DATA)return;renderReadouts(DATA);if(view==="board")renderBoard(DATA);else if(view==="agents")renderAgents(DATA);else renderDetail(DATA);}
function renderReadouts(d){const L=d.leverage||{skills_week:0,assets:0};
  document.getElementById("readouts").innerHTML=
   `<div class="ro"><div class="n up">+${L.skills_week}</div><div class="l">${t("ro_skill")}</div></div>`
  +`<div class="ro"><div class="n">${L.assets}</div><div class="l">${t("ro_assets")}</div></div>`
  +`<div class="ro"><div class="n live">${d.totals.live}</div><div class="l">${t("ro_live")}</div></div>`;}

function renderBoard(d){
  const byOp={};d.sessions.forEach(s=>{(byOp[s.operator]=byOp[s.operator]||[]).push(s);});
  const ops=Object.keys(byOp).sort();
  const pods=ops.map(op=>{const list=byOp[op],online=list.filter(a=>LIVE.includes(a.status)).length;
    const ring=online>0?"on":(list.some(a=>["error","blocked"].includes(a.status))?"err":"off");
    return `<div class="pod"><div class="phead"><span class="avatar ${ring}" style="--c:hsl(${hashHue(op)} 30% 42%)">${esc(initials(op))}</span>
      <span class="pname">${esc(op)}</span><span class="role">${t("dispatcher")}</span>
      <span class="pmeta">${t("squad")} ${list.length} · <b>${online}</b> ${t("live")}</span></div>
      <div class="grid">${list.map(cardHTML).join("")}</div></div>`;}).join("")
    || `<div class="empty"><div class="t">${t("noPods")}</div><div class="h">${t("noPodsH")}</div></div>`;
  document.getElementById("main").innerHTML=`<div class="split">
    <section class="frame"><h2><span><span class="sl">//</span>${t("pods")}</span><span class="cnt">${t("running")} <b>${d.totals.live}</b> / ${t("of")} ${d.sessions.length}</span></h2><div class="pad">${pods}</div></section>
    <section class="frame"><h2><span><span class="sl">//</span>${t("feed")}</span></h2><div>${feedHTML(d)}</div></section></div>`;
}
function cardHTML(s){const tag=s.agent||RT[s.runtime]||s.runtime,coarse=s.fidelity==="coarse";
  const models=(s.models||[]).slice(0,3).map(m=>`<span class="chip">${esc(m)}</span>`).join("");
  const nsk=s.skills?((s.skills.local||[]).length+(s.skills.cross||[]).length):0;
  return `<div class="card s-${s.status}" onclick="openAgent('${keyOf(s)}')">
    <div class="crow"><span class="mk"></span><span class="alabel">${esc(tag)}</span><span class="badge">${esc(RT[s.runtime]||s.runtime)}</span>${coarse?`<span class="coarse">${lang==="zh"?"云端·粗粒度":"cloud · coarse"}</span>`:""}<span class="age mono">${ago(s.ts)}</span></div>
    <div class="task">${esc(s.task)||"—"}</div><div class="step">${s.current_step?("▸ "+esc(s.current_step)):stName(s.status)}</div>
    <div class="chips">${models}${(s.mcp||[]).length?`<span class="chip">MCP ${s.mcp.length}</span>`:""}${nsk?`<span class="chip">Skill ${nsk}</span>`:""}</div>
    <div class="metrics"><span>${stName(s.status)}</span><span>${t("today")} <b>${dur(s.today_active)}</b></span>${sparkMini(s.active_series||[0,0,0,0,0,0,0])}</div></div>`;}
function feedHTML(d){return d.feed.map(f=>`<div class="feed-item"><span class="ft">${ago(f.ts)}</span><div class="fmain"><div class="l1">${esc(f.operator)}${f.agent?(" · "+esc(f.agent)):""} <span class="stx">${stName(f.status)}</span></div><div class="sub">${esc(RT[f.runtime]||f.runtime)} — ${esc(f.current_step||f.task||"")}</div></div></div>`).join("")||`<div class="empty"><div class="t">${t("silent")}</div></div>`;}

function renderAgents(d){
  const rows=d.sessions.map(s=>{const q=s.quality||{},sr=q.runs?Math.round(q.success/q.runs*100):null;
    const col=LIVE.includes(s.status)?"var(--run)":(["error","blocked"].includes(s.status)?"var(--err)":"var(--done)");
    return `<tr onclick="openAgent('${keyOf(s)}')"><td><b>${esc(s.agent||s.runtime)}</b></td><td>${esc(s.operator)}</td><td>${esc(RT[s.runtime]||s.runtime)}</td>
      <td class="q">${(s.models||[]).join(", ")||"—"}</td><td><span class="dot" style="background:${col}"></span>${stName(s.status)}</td>
      <td class="q">${dur(s.today_active)}</td><td class="q">${s.skills?((s.skills.local||[]).length+(s.skills.cross||[]).length):0}</td><td class="q">${(s.mcp||[]).length}</td>
      <td>${sr!=null?`<span class="qbar"><i style="width:${sr}%"></i></span><span class="q">${sr}%</span>`:"—"}</td></tr>`;}).join("");
  document.getElementById("main").innerHTML=`<section class="frame"><h2><span><span class="sl">//</span>${t("agents")}</span><span class="cnt"><b>${d.sessions.length}</b></span></h2>
    <table><thead><tr><th>${t("th_agent")}</th><th>${t("th_disp")}</th><th>${t("th_rt")}</th><th>${t("th_model")}</th><th>${t("th_status")}</th><th>${t("th_today")}</th><th>${t("th_skill")}</th><th>${t("th_mcp")}</th><th>${t("th_q")}</th></tr></thead><tbody>${rows}</tbody></table></section>`;
}

function renderDetail(d){
  const a=d.sessions.find(s=>keyOf(s)===selKey),m=document.getElementById("main");
  if(!a){m.innerHTML=`<a class="back" onclick="go('agents')">← ${t("back")}</a><div class="empty"><div class="t">${t("noAgent")}</div></div>`;return;}
  const q=a.quality||{},sr=q.runs?Math.round(q.success/q.runs*100):null;
  const col=LIVE.includes(a.status)?"var(--run)":(["error","blocked"].includes(a.status)?"var(--err)":"var(--done)");
  const sk=a.skills||{local:[],cross:[],pitfalls:[]};
  const cfg=a.config||{},mcp=a.mcp||[],mem=a.memory||MEMORY[keyOf(a)]||null;
  const skillRow=(arr,cls)=>(arr||[]).map(s=>`<div class="skill"><div class="nm">${esc(s.name)} <span class="pin ${cls}">${t(cls)}</span></div><div class="ds">${esc(s.desc||"")}</div></div>`).join("");
  const cf=a.cf||CONFIG[keyOf(a)]||{},integ=a.integrations||cf.integrations||[],ims=cf.ims||[];
  const tools=integ.map(x=>`<div class="skill"><div class="nm">${esc(x.name)}</div><div class="ds">${esc(x.desc||"")}</div></div>`).join("")||`<div class="hint">${t("none")}</div>`;
  const skillsAll=(skillRow(sk.local,"local")+skillRow(sk.cross,"cross"))||`<div class="hint">${t("none")}</div>`;
  const ser=a.active_series||[0,0,0,0,0,0,0],mx=Math.max(...ser,1);
  const bars=ser.map((v,i)=>`<i class="${i===6?"today":""}" style="height:${Math.max(4,Math.round(v/mx*100))}%" title="${dur(v)}"></i>`).join("");
  const cfgRows=Object.keys(cfg).length?Object.entries(cfg).map(([k,v])=>`<div class="kv"><span class="k">${esc(k)}</span><span class="v">${esc(String(v))}</span></div>`).join(""):`<div class="kv"><span class="k">${t("none")}</span><span class="v"></span></div>`;
  const recent=(a.recent||[]).map(r=>`<div class="rec"><div class="rt"><span class="rtask">${esc(r.task)}</span><span class="st ${r.status}">${stName(r.status)} · ${dur(r.dur)}</span></div><div class="ro2">${esc(r.outcome||"")}</div></div>`).join("")||`<div class="kv"><span class="k">${t("none")}</span></div>`;
  const pits=(sk.pitfalls||[]).map(p=>`<div class="mem"><span class="mt">${t("pit")}</span>${esc(typeof p==="string"?p:p.name)}</div>`).join("")||`<div class="hint">${t("none")}</div>`;
  // governance — 触达面 / 权限(主要来自系统配置)
  const writey=/write|autonomous/i.test(JSON.stringify(cfg)), risk=writey||mcp.length>=3;
  const acc=[["a_shell",cfg.sandbox||"—",/write/i.test(cfg.sandbox||"")],
             ["a_auto",cfg.auto_approve||cfg.mode||"—",/write|autonomous/i.test(cfg.auto_approve||cfg.mode||"")],
             ["a_net",mcp.length?"via MCP":(cfg.network||"—"),false]]
    .map(([k,v,w])=>`<div class="acc"><span class="k">${t(k)}</span><span class="v ${w?"warn":""}">${esc(String(v))}</span></div>`).join("");
  const nmem=mem?((mem.conventions||[]).length+(mem.learned||[]).length):0;
  const memAge=mem?ago(new Date(Date.now()-(mem.updated||0)*1000).toISOString()):"";
  const govbar=`<div class="govbar">
    <span class="gv"><span class="src">RUNTIME</span><b>${esc(RT[a.runtime]||a.runtime)}</b></span>
    <span class="gv"><span class="src">${t("models")}</span><b>${(a.models||[]).length}</b></span>
    <span class="gv ${mcp.length>=3?"warn":""}"><span class="src">${t("gb_reach")}</span><b>${mcp.length} MCP</b></span>
    <span class="gv"><span class="src">${t("gb_mem")}</span><b>${nmem}</b></span>
    <span class="gv ${risk?"warn":"ok"}"><span class="src">${t("gb_risk")}</span><b>${risk?t("risk_warn"):t("risk_ok")}</b></span>
  </div>`;
  const memPanel=mem
