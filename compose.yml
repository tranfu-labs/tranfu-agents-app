services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: tranfu-agents-app:local
    environment:
      TF_DB: /data/tf.db
      PORT: "8788"
      TF_KEY: ${TF_KEY}
      TF_REQUIRE_TOKEN: ${TF_REQUIRE_TOKEN:-}
      TF_READ_AUTH: ${TF_READ_AUTH:-}
      TF_READ_KEY: ${TF_READ_KEY:-}
      TF_ADMIN_KEY: ${SERVICE_PASSWORD_64_ADMIN:-}
      TF_TRASH_DAYS: ${TF_TRASH_DAYS:-30}
      TF_ADMIN_MAX_ROWS: ${TF_ADMIN_MAX_ROWS:-200}
      TF_STATE_TTL: ${TF_STATE_TTL:-1.5}
      TF_TOKEN_USAGE_BASE_URL: ${TF_TOKEN_USAGE_BASE_URL:-https://api.tranfu.com}
      TF_TOKEN_USAGE_PATH: ${TF_TOKEN_USAGE_PATH:-/api/data/keys}
      TF_TOKEN_USAGE_ACCESS_TOKEN: ${TF_TOKEN_USAGE_ACCESS_TOKEN:-}
      TF_TOKEN_USAGE_COOKIE: ${TF_TOKEN_USAGE_COOKIE:-}
      TF_TOKEN_USAGE_USER_ID: ${TF_TOKEN_USAGE_USER_ID:-}
      TF_TOKEN_USAGE_TIMEOUT: ${TF_TOKEN_USAGE_TIMEOUT:-15}
      TF_TOKEN_USAGE_CACHE_TTL: ${TF_TOKEN_USAGE_CACHE_TTL:-90}
      TF_TOKEN_USAGE_DEMO: ${TF_TOKEN_USAGE_DEMO:-1}
    volumes:
      - tf-data:/data
    expose:
      - "8788"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8788/healthz', timeout=8).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  tf-data:
