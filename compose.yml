services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: tranfu-agents-app:local
    environment:
      TF_DB: /data/tf.db
      PORT: "8788"
      TF_KEY: ${TF_KEY}
      TF_REQUIRE_TOKEN: ${TF_REQUIRE_TOKEN:-}
      TF_READ_AUTH: ${TF_READ_AUTH:-}
      TF_READ_KEY: ${TF_READ_KEY:-}
    volumes:
      - tf-data:/data
    expose:
      - "8788"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8788/healthz', timeout=2).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  tf-data:
