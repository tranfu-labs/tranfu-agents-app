services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: tranfu-agents-app:local
    env_file:
      - ${TF_ENV_FILE:-.env}
    environment:
      TF_DB: /data/tf.db
      PORT: "8788"
    volumes:
      - tf-data:/data
    ports:
      - "${TF_PORT:-8788}:8788"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8788/healthz', timeout=2).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  tf-data:
