services:
  server:
    image: ${IMAGE_REF:-ghcr.io/tranfu-labs/tranfu-agents-app:dev}
    pull_policy: always
    environment:
      TF_DB: /data/tf.db
      PORT: "8788"
      TF_KEY: ${TF_KEY}
      TF_REQUIRE_TOKEN: ${TF_REQUIRE_TOKEN:-}
      TF_READ_AUTH: ${TF_READ_AUTH:-}
      TF_READ_KEY: ${TF_READ_KEY:-}
      TF_ADMIN_KEY: ${SERVICE_PASSWORD_64_ADMIN:-}
      TF_TRASH_DAYS: ${TF_TRASH_DAYS:-30}
      TF_ADMIN_MAX_ROWS: ${TF_ADMIN_MAX_ROWS:-200}
      TF_STATE_TTL: ${TF_STATE_TTL:-1.5}
    volumes:
      - tvve4z1rplm1eqe9c0dgdybw_tf-data:/data
    expose:
      - "8788"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/healthz' % os.environ.get('PORT', '8788'), timeout=8).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

volumes:
  tvve4z1rplm1eqe9c0dgdybw_tf-data:
    name: tvve4z1rplm1eqe9c0dgdybw_tf-data
